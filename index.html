<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>À Cœur Ouvert - Porteuse de Vie</title>

    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>

<body>

<header class="luxury-header">
    <div class="brand-badge">Porteuse de Vie • Soirée À Cœur Ouvert</div>
    <h1>À Cœur Ouvert</h1>
    <div class="verset">Car l'Éternel sonde tous les cœurs — 1 Chr 28:9</div>
</header>

<div class="grid-layout">
    <div class="card-premium cocon-card col-12">

        <div class="cocon-title">Boîte à Questions Secrètes</div>
        <div class="cocon-subtitle">
            Posez tout ce qui est sur votre cœur, sans retenue.
        </div>

        <div class="anon-badge">
            🔒 Totalement anonyme
        </div>

        <textarea
            id="private-message"
            class="input-premium"
            rows="5"
            placeholder="Pose ta question ici..."
            oninput="updateChar(this)">
        </textarea>

        <div class="char-hint" id="char-hint">0 / 500 caractères</div>

        <button class="btn-cocon" id="send-btn" onclick="sendSecret()">
            🕊️ Envoyer au Cocon
        </button>

        <div class="blessing-box" id="blessing-box">
            <span id="blessing-emoji">🌸</span>
            <div id="blessing-title"></div>
            <div id="blessing-verset"></div>
            <div id="blessing-ref"></div>
        </div>

        <div class="alert-error" id="alert-error">
            ⚠️ Erreur d’envoi. Réessaie.
        </div>

    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
    apiKey: "AIzaSyBR_Aq3uBI1mmARbSSXXWnmxBI4wq19lxs",
    authDomain: "a-coeur-ouver.firebaseapp.com",
    databaseURL: "https://a-coeur-ouver-default-rtdb.firebaseio.com",
    projectId: "a-coeur-ouver",
    storageBucket: "a-coeur-ouver.firebasestorage.app",
    messagingSenderId: "385888150365",
    appId: "1:385888150365:web:4dd22f9d5ca0e53b7bfeb4"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const blessings = [
    { emoji:"🌸", title:"Message envoyé", verset:"Dieu te bénisse", ref:"Amen" },
    { emoji:"🕊️", title:"Message reçu", verset:"Paix sur toi", ref:"Amen" },
    { emoji:"✨", title:"Cœur entendu", verset:"Ne crains pas", ref:"Ésaïe 41:10" }
];

window.updateChar = function(el) {
    document.getElementById("char-hint").textContent =
        el.value.length + " / 500 caractères";
};

window.sendSecret = async function () {
    const field = document.getElementById("private-message");
    const text = field.value.trim();

    if (!text) return;

    const btn = document.getElementById("send-btn");
    btn.disabled = true;
    btn.textContent = "Envoi...";

    try {
        await push(ref(db, "questions"), {
            texte: text,
            timestamp: Date.now()
        });

        field.value = "";
        document.getElementById("char-hint").textContent = "0 / 500 caractères";

        const b = blessings[Math.floor(Math.random() * blessings.length)];

        document.getElementById("blessing-emoji").textContent = b.emoji;
        document.getElementById("blessing-title").textContent = b.title;
        document.getElementById("blessing-verset").textContent = b.verset;
        document.getElementById("blessing-ref").textContent = b.ref;

        document.getElementById("blessing-box").style.display = "block";

        setTimeout(() => {
            document.getElementById("blessing-box").style.display = "none";
        }, 6000);

    } catch (e) {
        document.getElementById("alert-error").style.display = "block";
    }

    btn.disabled = false;
    btn.textContent = "🕊️ Envoyer au Cocon";
};
</script>

</body>
</html>
