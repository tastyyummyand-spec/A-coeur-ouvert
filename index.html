<style>

.cocon-card {
    background: linear-gradient(
        145deg,
        rgba(255,255,255,0.75),
        rgba(237,233,254,0.5)
    );

    border: 1px solid rgba(167,139,250,0.2);

    border-radius: 28px;

    padding: 40px 36px;

    text-align: center;

    position: relative;

    overflow: hidden;
}

/* ✨ GLOW PREMIUM À LA PLACE DE LA CROIX */

.cocon-card::before {

    content: '';

    position: absolute;

    width: 260px;
    height: 260px;

    border-radius: 50%;

    background:
    radial-gradient(
        circle,
        rgba(167,139,250,0.14),
        transparent 70%
    );

    top: -120px;
    right: -120px;

    z-index: 0;

    pointer-events: none;
}

/* LE CONTENU RESTE AU-DESSUS */

.cocon-card > * {

    position: relative;

    z-index: 2;
}

.cocon-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2rem;
    font-style: italic;
    font-weight: 300;
    color: var(--purple-deep);
    margin-bottom: 8px;
}

.cocon-subtitle {
    font-size: 0.85rem;
    color: var(--purple-mid);
    opacity: 0.75;
    margin-bottom: 28px;
    line-height: 1.6;
}

.anon-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(167,139,250,0.12);
    border: 1px solid rgba(167,139,250,0.25);
    border-radius: 50px;
    padding: 5px 14px;
    font-size: 0.75rem;
    color: var(--purple-mid);
    font-weight: 500;
    margin-bottom: 22px;
    letter-spacing: 0.3px;
}

.char-hint {
    font-size: 0.75rem;
    color: var(--purple-mid);
    opacity: 0.45;
    text-align: right;
    margin: 6px 0 18px;
}

.btn-cocon {
    background:
    linear-gradient(
        135deg,
        #3b0764 0%,
        #6d28d9 60%,
        #a78bfa 100%
    );

    color: white;

    border: none;

    padding: 16px 36px;

    border-radius: 50px;

    font-family: 'DM Sans', sans-serif;

    font-weight: 500;

    font-size: 0.9rem;

    letter-spacing: 0.5px;

    cursor: pointer;

    width: 100%;

    transition: all 0.3s ease;

    box-shadow:
    0 6px 24px rgba(109,40,217,0.3);
}

.btn-cocon:hover {

    transform: translateY(-2px);

    box-shadow:
    0 10px 30px rgba(109,40,217,0.4);
}

.btn-cocon:active {
    transform: scale(0.98);
}

.btn-cocon:disabled {
    opacity: 0.6;
    cursor: not-allowed;
    transform: none;
}

.blessing-box {

    display: none;

    margin-top: 28px;

    padding: 28px 24px;

    background:
    linear-gradient(
        135deg,
        rgba(237,233,254,0.8),
        rgba(252,231,243,0.6)
    );

    border-radius: 20px;

    border: 1px solid rgba(167,139,250,0.25);

    animation: fadeInUp 0.5s ease;
}

@keyframes fadeInUp {

    from {
        opacity: 0;
        transform: translateY(12px);
    }

    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.blessing-emoji {

    font-size: 2.2rem;

    margin-bottom: 10px;

    display: block;
}

.blessing-title {

    font-family: 'Cormorant Garamond', serif;

    font-size: 1.35rem;

    font-style: italic;

    color: var(--purple-deep);

    margin-bottom: 10px;
}

.blessing-verset {

    font-size: 0.83rem;

    color: var(--purple-royal);

    line-height: 1.75;

    font-style: italic;

    opacity: 0.9;
}

.blessing-ref {

    font-size: 0.75rem;

    color: var(--purple-light);

    margin-top: 8px;

    font-weight: 600;
}

.alert-error {

    display: none;

    margin-top: 15px;

    color: #7f1d1d;

    font-size: 0.85rem;

    background: #fef2f2;

    padding: 12px 16px;

    border-radius: 12px;

    border: 1px solid #fecaca;
}

</style>
