<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>À Cœur Ouvert - Code Girlz</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600&family=Playfair+Display:ital,wght@1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="floating-particle" style="top:25%; left:12%; animation-delay: 2s;">🦋</div>
    <div class="floating-particle" style="top:60%; left:75%; animation-delay: 5s;">✝️</div>

    <header class="luxury-header" style="padding: 50px 20px 15px;">
        <h1>À Cœur Ouvert</h1>
        <div class="verset" style="font-family:'Montserrat'; text-transform:none;">Exprimez-vous en toute liberté.</div>
    </header>

    <div class="grid-layout" style="margin-top: 0;">
        <div class="card-premium col-12">
            <h2>Boîte à Questions Secrètes</h2>
            <p style="margin-bottom: 20px; font-size: 0.95rem; opacity: 0.75;">Votre anonymat est totalement préservé. Posez votre question en toute confiance.</p>
            
            <form action="https://formspree.io/f/mqakpved" method="POST" id="coeur-form">
                <textarea name="question" id="private-message" class="input-premium" rows="5" placeholder="Posez votre question sur la foi, l'identité, les relations..." required></textarea>
                
                <button type="submit" class="btn-premium" style="width: 100%; margin-top: 20px; justify-content: center;">
                    Déposer dans le Cocon Sacré
                </button>
            </form>
            
            <p id="alert-success" style="display: none; text-align: center; margin-top: 15px; color: var(--purple-royal, #6a1b9a); font-weight: 600; font-size: 0.9rem;">
                ✨ Votre question a été déposée avec douceur. Merci, ma sœur.
            </p>
        </div>
    </div>

    <script>
        // Script pour éviter que la page ne recharge quand on valide
        const form = document.getElementById('coeur-form');
        const successAlert = document.getElementById('alert-success');
        const textarea = document.getElementById('private-message');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = new FormData(form);
            
            successAlert.innerText = "⏳ Envoi au cocon en cours...";
            successAlert.style.display = "block";

            const response = await fetch(form.action, {
                method: form.method,
                body: data,
                headers: { 'Accept': 'application/json' }
            });

            if (response.ok) {
                textarea.value = "";
                successAlert.innerText = "✨ Votre question a été déposée avec douceur. Merci, ma sœur.";
                setTimeout(() => { successAlert.style.display = "none"; }, 5000);
            } else {
                successAlert.innerText = "❌ Une petite erreur est survenue, réessayez.";
            }
        });
    </script>
</body>
</html>
