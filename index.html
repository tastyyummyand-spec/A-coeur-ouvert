<script>
        // CODE SECRET POUR L'ANIMATRICE : Modifié pour "08 aout"
        const SECRET_CODE = "08 aout"; 
        let clickCount = 0;

        // Fonction pour envoyer une question
        function sendSecret() {
            const field = document.getElementById('private-message');
            const text = field.value.trim();
            if (text !== "") {
                const stack = JSON.parse(localStorage.getItem('coeur-questions') || '[]');
                stack.push(text);
                localStorage.setItem('coeur-questions', JSON.stringify(stack));
                
                field.value = "";
                document.getElementById('alert-success').style.display = "block";
                
                // Si l'admin est ouvert, on rafraîchit la liste tout de suite
                if (document.getElementById('admin-section').style.display === "block") {
                    renderQuestions();
                }
                
                setTimeout(() => { document.getElementById('alert-success').style.display = "none"; }, 4000);
            }
        }

        // Déclencheur secret : si on clique 3 fois en haut à droite, ça demande le code
        function checkSecretClick() {
            clickCount++;
            if (clickCount >= 3) {
                clickCount = 0;
                askAdminCode();
            }
            // Réinitialise le compteur après 2 secondes d'inactivité
            setTimeout(() => { clickCount = 0; }, 2000);
        }

        // Demander le code secret
        function askAdminCode() {
            const password = prompt("Entrez le code secret animatrice pour afficher les questions :");
            // Conversion en minuscules pour accepter "08 Aout" ou "08 aout"
            if (password && password.toLowerCase().trim() === SECRET_CODE) {
                document.getElementById('admin-section').style.display = "block";
                renderQuestions();
                // Défilement automatique vers la section admin
                document.getElementById('admin-section').scrollIntoView({ behavior: 'smooth' });
            } else if (password !== null) {
                alert("Code incorrect 🤫");
            }
        }

        // Fermer l'espace admin
        function hideAdmin() {
            document.getElementById('admin-section').style.display = "none";
        }

        // Afficher les questions dans l'espace admin
        function renderQuestions() {
            const container = document.getElementById('questions-list');
            const stack = JSON.parse(localStorage.getItem('coeur-questions') || '[]');
            
            if (stack.length === 0) {
                container.innerHTML = "<p style='text-align:center; opacity:0.5; font-style:italic;'>Aucune question pour le moment... ✨</p>";
                return;
            }
            
            container.innerHTML = "";
            stack.forEach((question, index) => {
                const item = document.createElement('div');
                item.className = 'question-item';
                item.innerHTML = `
                    <p style="margin:0; padding-right:15px; font-size:0.95rem; line-height:1.4;">${question}</p>
                    <button class="btn-delete" onclick="deleteQuestion(${index})">Supprimer</button>
                `;
                container.appendChild(item);
            });
        }

        // Supprimer une question lue
        function deleteQuestion(index) {
            if (confirm("Supprimer cette question définitivement ?")) {
                const stack = JSON.parse(localStorage.getItem('coeur-questions') || '[]');
                stack.splice(index, 1);
                localStorage.setItem('coeur-questions', JSON.stringify(stack));
                renderQuestions();
            }
        }
    </script>
