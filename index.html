<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>À Cœur Ouvert - Porteuse de Vie</title>

    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --purple-deep: #1a0533;
            --purple-royal: #3b0764;
            --purple-mid: #6d28d9;
            --purple-light: #a78bfa;
            --glass: rgba(255,255,255,0.62);
            --glass-border: rgba(167,139,250,0.25);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: #f5f0ff;
            color: var(--purple-deep);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ❌ CROIX SUPPRIMÉE (plus de body::before) */

        .luxury-header {
            text-align: center;
            padding: 70px 20px 40px;
        }

        .luxury-header h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 4rem;
            font-style: italic;
            color: var(--purple-deep);
        }

        .brand-badge {
            font-size: 0.7rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--purple-mid);
            margin-bottom: 15px;
        }

        .grid-layout {
            max-width: 900px;
            margin: auto;
            padding: 20px;
        }

        .card {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 25px;
            padding: 30px;
            backdrop-filter: blur(30px);
        }

        .title {
            font-size: 1.5rem;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 0.9rem;
            opacity: 0.7;
            margin-bottom: 20px;
        }

        textarea {
            width: 100%;
            height: 120px;
            padding: 15px;
            border-radius: 15px;
            border: 1px solid rgba(109,40,217,0.2);
            outline: none;
            resize: none;
        }

        button {
            width: 100%;
            margin-top: 15px;
            padding: 15px;
            border: none;
            border-radius: 30px;
            background: linear-gradient(135deg,#3b0764,#6d28d9,#a78bfa);
            color: white;
            font-weight: 600;
            cursor: pointer;
        }

        .success {
            display: none;
            margin-top: 20px;
            padding: 15px;
            background: #ede9fe;
            border-radius: 15px;
        }
    </style>
</head>

<body>

<header class="luxury-header">
    <div class="brand-badge">Porteuse de Vie</div>
    <h1>À Cœur Ouvert</h1>
</header>

<div class="grid-layout">
    <div class="card">
        <div class="title">Boîte à questions</div>
        <div class="subtitle">Écris en toute confidentialité</div>

        <textarea id="msg" placeholder="Écris ici..."></textarea>

        <button onclick="send()">Envoyer</button>

        <div class="success" id="success">
            Message envoyé ✨
        </div>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
    apiKey: "AIzaSyBR_Aq3uBI1mmARbSSXXWnmxBI4wq19lxs",
    authDomain: "a-coeur-ouver.firebaseapp.com",
    databaseURL: "https://a-coeur-ouver-default-rtdb.firebaseio.com",
    projectId: "a-coeur-ouver",
    storageBucket: "a-coeur-ouver.firebasestorage.app",
    messagingSenderId: "385888150365",
    appId: "1:385888150365:web:4dd22f9d5ca0e53b7bfeb4"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

window.send = async function () {
    const msg = document.getElementById("msg").value.trim();
    if (!msg) return;

    await push(ref(db, "questions"), {
        texte: msg,
        timestamp: Date.now()
    });

    document.getElementById("msg").value = "";
    document.getElementById("success").style.display = "block";

    setTimeout(() => {
        document.getElementById("success").style.display = "none";
    }, 3000);
};
</script>

</body>
</html>
