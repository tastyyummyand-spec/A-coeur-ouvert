<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>À Cœur Ouvert - Code Girlz</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600&family=Playfair+Display:ital,wght=1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        #admin-section {
            display: none;
            margin-top: 40px;
            border-top: 2px dashed #6a1b9a;
            padding-top: 30px;
        }
        .admin-title {
            color: #6a1b9a;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .question-item {
            background: rgba(255, 255, 255, 0.9);
            border-left: 4px solid #6a1b9a;
            padding: 15px;
            margin-bottom: 12px;
            border-radius: 4px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .btn-delete {
            background: #ff4d4d;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
        }
        .secret-trigger {
            width: 70px;
            height: 70px;
            position: absolute;
            top: 0;
            right: 0;
            z-index: 9999;
        }
    </style>
</head>
<body>

    <div class="secret-trigger" onclick="checkSecretClick()"></div>

    <header class="luxury-header" style="padding: 50px 20px 15px;">
        <h1>À Cœur Ouvert</h1>
        <div class="verset">Exprimez-vous en toute liberté.</div>
    </header>

    <div class="grid-layout">
        <div class="card-premium col-12">
            <h2>Boîte à Questions Secrètes</h2>
            <textarea id="private-message" class="input-premium" rows="5" placeholder="Posez votre question..."></textarea>
            
            <button class="btn-premium" style="width: 100%; margin-top: 20px;" onclick="sendSecret()">
                Déposer dans le Cocon Sacré
            </button>
            
            <p id="alert-success" style="display: none; text-align: center; margin-top: 15px; color: #6a1b9a; font-weight: 600;"></p>
        </div>

        <div id="admin-section" class="card-premium col-12">
            <div class="admin-title">
                <h2>Espace Animatrice (🔒 En Direct)</h2>
                <div>
                    <button class="btn-premium" style="padding: 5px 15px; background: #28a745;" onclick="renderQuestions()">🔄 Rafraîchir</button>
                    <button class="btn-premium" style="padding: 5px 15px; background: #666;" onclick="hideAdmin()">Fermer</button>
                </div>
            </div>
            <div id="questions-list" style="margin-top: 20px;">
                <p style='text-align:center; opacity:0.5;'>Cliquez sur Rafraîchir... ✨</p>
            </div>
        </div>
    </div>

    <script>
        let clickCount = 0;
        
        // Système de secours ultra-simple via un relai web universel (CountAPI public alternative)
        const SURF_URL = "https://api.allorigins.win/get?url=" + encodeURIComponent("https://api.kvdb.io/v1/buckets/coeur_girlz_2026/keys/list");

        async function sendSecret() {
            const field = document.getElementById('private-message');
            const text = field.value.trim();
            const alertBox = document.getElementById('alert-success');
            
            if (text !== "") {
                alertBox.innerText = "⏳ Envoi...";
                alertBox.style.display = "block";

                try {
                    // Récupération sécurisée
                    let list = [];
                    const res = await fetch("https://api.kvdb.io/v1/buckets/coeur_girlz_2026/keys/list");
                    if (res.ok) list = await res.json();
                    
                    list.push(text);

                    // Envoi direct qui passe tous les blocages de téléphones
                    await fetch("https://api.kvdb.io/v1/buckets/coeur_girlz_2026/keys/list", {
                        method: 'POST',
                        body: JSON.stringify(list)
                    });

                    field.value = "";
                    alertBox.innerText = "✨ Déposé avec douceur !";
                    if (document.getElementById('admin-section').style.display === "block") {
                        renderQuestions();
                    }
                } catch (error) {
                    alertBox.innerText = "❌ Réessayez, connexion ralentie.";
                }
                setTimeout(() => { alertBox.style.display = "none"; }, 3000);
            }
        }

        function checkSecretClick() {
            clickCount++;
            if (clickCount >= 3) {
                clickCount = 0;
                const password = prompt("Code secret animatrice :");
                if (password && (password.toLowerCase().trim() === "08 aout" || password.toLowerCase().trim() === "08 août")) {
                    document.getElementById('admin-section').style.display = "block";
                    renderQuestions();
                } else if (password !== null) {
                    alert("Code incorrect 🤫");
                }
            }
            setTimeout(() => { clickCount = 0; }, 2000);
        }

        function hideAdmin() { document.getElementById('admin-section').style.display = "none"; }

        async function renderQuestions() {
            const container = document.getElementById('questions-list');
            container.innerHTML = "<p style='text-align:center; opacity:0.5;'>Mise à jour... ⏳</p>";
            
            try {
                const res = await fetch("https://api.kvdb.io/v1/buckets/coeur_girlz_2026/keys/list");
                const stack = await res.json();
                
                if (!stack || stack.length === 0) {
                    container.innerHTML = "<p style='text-align:center; opacity:0.5;'>Aucune question... ✨</p>";
                    return;
                }
                
                container.innerHTML = "";
                stack.forEach((question, index) => {
                    const item = document.createElement('div');
                    item.className = 'question-item';
                    item.innerHTML = `
                        <p style="margin:0; color:#333;">${question}</p>
                        <button class="btn-delete" onclick="deleteQuestion(${index})">Supprimer</button>
                    `;
                    container.appendChild(item);
                });
            } catch (error) {
                container.innerHTML = "<p style='text-align:center; opacity:0.5;'>Aucune question pour l'instant. Lancez un test ! ✨</p>";
            }
        }

        async function deleteQuestion(index) {
            if (confirm("Supprimer cette question ?")) {
                try {
                    const res = await fetch("https://api.kvdb.io/v1/buckets/coeur_girlz_2026/keys/list");
                    let list = await res.json();
                    list.splice(index, 1);
                    await fetch("https://api.kvdb.io/v1/buckets/coeur_girlz_2026/keys/list", {
                        method: 'POST',
                        body: JSON.stringify(list)
                    });
                    renderQuestions();
                } catch (e) {}
            }
        }
    </script>
</body>
</html>
