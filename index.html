<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>À Cœur Ouvert - Code Girlz</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600&family=Playfair+Display:ital,wght=1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        #admin-section {
            display: none;
            margin-top: 40px;
            border-top: 2px dashed #6a1b9a;
            padding-top: 30px;
        }
        .admin-title {
            color: #6a1b9a;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .question-item {
            background: rgba(255, 255, 255, 0.9);
            border-left: 4px solid #6a1b9a;
            padding: 15px;
            margin-bottom: 12px;
            border-radius: 4px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .secret-trigger {
            width: 70px;
            height: 70px;
            position: absolute;
            top: 0;
            right: 0;
            z-index: 9999;
        }
    </style>
</head>
<body>

    <div class="secret-trigger" onclick="checkSecretClick()"></div>

    <div class="floating-particle" style="top:25%; left:12%; animation-delay: 2s;">🦋</div>
    <div class="floating-particle" style="top:60%; left:75%; animation-delay: 5s;">✝️</div>

    <header class="luxury-header" style="padding: 50px 20px 15px;">
        <h1>À Cœur Ouvert</h1>
        <div class="verset">Exprimez-vous en toute liberté.</div>
    </header>

    <div class="grid-layout">
        <div class="card-premium col-12">
            <h2>Boîte à Questions Secrètes</h2>
            <p style="margin-bottom: 20px; font-size: 0.95rem; opacity: 0.75;">Votre anonymat est totalement préservé.</p>
            
            <textarea id="private-message" class="input-premium" rows="5" placeholder="Posez votre question de manière anonyme..."></textarea>
            
            <button class="btn-premium" style="width: 100%; margin-top: 20px; justify-content: center;" onclick="sendSecret()">
                Déposer dans le Cocon Sacré
            </button>
            
            <p id="alert-success" style="display: none; text-align: center; margin-top: 15px; color: #6a1b9a; font-weight: 600; font-size: 0.9rem;"></p>
        </div>

        <div id="admin-section" class="card-premium col-12">
            <div class="admin-title">
                <h2>Espace Animatrice (🔒 Vos questions reçues)</h2>
                <button class="btn-premium" style="padding: 5px 15px; background: #666;" onclick="hideAdmin()">Fermer</button>
            </div>
            <p style="margin-bottom: 20px; font-size: 0.9rem; opacity: 0.8;">Voici les questions sauvegardées localement sur cet appareil :</p>
            
            <div id="questions-list">
                <p style='text-align:center; opacity:0.5; font-style:italic;'>Aucune question reçue sur cet appareil pour l'instant. ✨</p>
            </div>
        </div>
    </div>

    <script>
        let clickCount = 0;

        // Fonction d'envoi simplifiée et sécurisée
        function sendSecret() {
            const field = document.getElementById('private-message');
            const text = field.value.trim();
            const alertBox = document.getElementById('alert-success');
            
            if (text !== "") {
                // Sauvegarde immédiate dans la liste commune de l'appareil courant
                let questions = JSON.parse(localStorage.getItem('messages_coeur') || '[]');
                questions.push(text);
                localStorage.setItem('messages_coeur', JSON.stringify(questions));

                // Effacer le champ et afficher le succès
                field.value = "";
                alertBox.innerText = "✨ Votre question a été déposée avec douceur. Merci, ma sœur.";
                alertBox.style.display = "block";
                
                if (document.getElementById('admin-section').style.display === "block") {
                    renderQuestions();
                }
                
                setTimeout(() => { alertBox.style.display = "none"; }, 4000);
            }
        }

        // Gestion du triple clic en haut à droite
        function checkSecretClick() {
            clickCount++;
            if (clickCount >= 3) {
                clickCount = 0;
                askAdminCode();
            }
            setTimeout(() => { clickCount = 0; }, 2000);
        }

        // Fenêtre de mot de passe "08 aout"
        function askAdminCode() {
            const password = prompt("Entrez le code secret animatrice pour afficher les questions :");
            if (password) {
                const cleanPassword = password.toLowerCase().trim();
                if (cleanPassword === "08 aout" || cleanPassword === "08 août") {
                    document.getElementById('admin-section').style.display = "block";
                    renderQuestions();
                    document.getElementById('admin-section').scrollIntoView({ behavior: 'smooth' });
                    return;
                }
            }
            if (password !== null) alert("Code incorrect 🤫");
        }

        function hideAdmin() {
            document.getElementById('admin-section').style.display = "none";
        }

        // Affichage des questions
        function renderQuestions() {
            const container = document.getElementById('questions-list');
            const questions = JSON.parse(localStorage.getItem('messages_coeur') || '[]');
            
            if (questions.length === 0) {
                container.innerHTML = "<p style='text-align:center; opacity:0.5; font-style:italic;'>Aucune question pour le moment... ✨</p>";
                return;
            }
            
            container.innerHTML = "";
            questions.forEach((question) => {
                const item = document.createElement('div');
                item.className = 'question-item';
                item.innerHTML = `<p style="margin:0; color:#333; font-size:0.95rem; line-height:1.4;">${question}</p>`;
                container.appendChild(item);
            });
        }
    </script>
</body>
</html>
