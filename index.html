<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>À Cœur Ouvert - Code Girlz</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600&family=Playfair+Display:ital,wght=1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        /* On cache la partie admin tout en bas */
        #admin-section {
            display: none;
            margin-top: 40px;
            border-top: 2px dashed #6a1b9a;
            padding-top: 30px;
        }
        .question-item {
            background: #fff;
            border-left: 4px solid #6a1b9a;
            padding: 15px;
            margin-bottom: 12px;
            border-radius: 4px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .btn-delete {
            background: #ff4d4d;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
        }
        /* Zone invisible en haut à droite pour taper 3 fois */
        .secret-trigger {
            width: 60px;
            height: 60px;
            position: absolute;
            top: 0;
            right: 0;
            z-index: 9999;
        }
    </style>
</head>
<body>

    <div class="secret-trigger" onclick="checkSecretClick()"></div>

    <header class="luxury-header" style="padding: 50px 20px 15px;">
        <h1>À Cœur Ouvert</h1>
        <div class="verset">Exprimez-vous en toute liberté.</div>
    </header>

    <div class="grid-layout">
        <div class="card-premium col-12">
            <h2>Boîte à Questions Secrètes</h2>
            <textarea id="private-message" class="input-premium" rows="5" placeholder="Posez votre question anonymement..."></textarea>
            
            <button class="btn-premium" style="width: 100%; margin-top: 20px;" onclick="sendSecret()">
                Déposer dans le Cocon Sacré
            </button>
            
            <p id="alert-success" style="display: none; text-align: center; margin-top: 15px; color: #6a1b9a; font-weight: 600;">
                ✨ Votre question a été déposée avec douceur.
            </p>
        </div>

        <div id="admin-section" class="card-premium col-12">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h2>Espace Animatrice (🔒 En Direct)</h2>
                <div>
                    <button class="btn-premium" style="padding: 5px 15px; background: #28a745;" onclick="renderQuestions()">🔄 Rafraîchir</button>
                    <button class="btn-premium" style="padding: 5px 15px; background: #666;" onclick="hideAdmin()">Fermer</button>
                </div>
            </div>
            <div id="questions-list" style="margin-top: 20px;">
                <p style="text-align:center; opacity:0.5;">Cliquez sur Rafraîchir pour voir les messages...</p>
            </div>
        </div>
    </div>

    <script>
        const SECRET_CODE = "08 aout";
        let clickCount = 0;
        
        // URL de stockage public temporaire pour ta soirée (Zéro configuration requise)
        const URL_CLOUD = "https://api.allorigins.win/get?url=" + encodeURIComponent("https://crudcrud.com/api/88fa632ba5f84d63b2fba96b5cb99477/messages");

        // 1. LES FILLES ENVOIENT DEPUIS LEUR APPAREIL
        async function sendSecret() {
            const field = document.getElementById('private-message');
            const text = field.value.trim();
            if (text === "") return;

            document.getElementById('alert-success').innerText = "⏳ Envoi...";
            document.getElementById('alert-success').style.display = "block";

            try {
                // Envoi direct au serveur temporaire
                await fetch("https://crudcrud.com/api/88fa632ba5f84d63b2fba96b5cb99477/messages", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ text: text })
                });

                field.value = "";
                document.getElementById('alert-success').innerText = "✨ Déposé avec douceur !";
                if (document.getElementById('admin-section').style.display === "block") {
                    renderQuestions();
                }
            } catch (e) {
                document.getElementById('alert-success').innerText = "❌ Souci de réseau, réessaie.";
            }
            setTimeout(() => { document.getElementById('alert-success').style.display = "none"; }, 3000);
        }

        // 2. TRIPLE CLIC POUR TOI
        function checkSecretClick() {
            clickCount++;
            if (clickCount >= 3) {
                clickCount = 0;
                const password = prompt("Code secret animatrice :");
                if (password && (password.toLowerCase().trim() === "08 aout" || password.toLowerCase().trim() === "08 août")) {
                    document.getElementById('admin-section').style.display = "block";
                    renderQuestions();
                } else if (password !== null) {
                    alert("Code incorrect 🤫");
                }
            }
            setTimeout(() => { clickCount = 0; }, 2000);
        }

        function hideAdmin() {
            document.getElementById('admin-section').style.display = "none";
        }

        // 3. TU CHARGES LES MESSAGES EN CLIQUANT SUR "RAFRAÎCHIR"
        async function renderQuestions() {
            const container = document.getElementById('questions-list');
            container.innerHTML = "<p style='text-align:center; opacity:0.5;'>Mise à jour... ⏳</p>";

            try {
                const response = await fetch("https://crudcrud.com/api/88fa632ba5f84d63b2fba96b5cb99477/messages");
                const data = await response.json();

                if (!data || data.length === 0) {
                    container.innerHTML = "<p style='text-align:center; opacity:0.5;'>Aucune question pour le moment... ✨</p>";
                    return;
                }

                container.innerHTML = "";
                data.forEach((item) => {
                    const box = document.createElement('div');
                    box.className = 'question-item';
                    box.innerHTML = `
                        <p style="margin:0; color:#333;">${item.text}</p>
                        <button class="btn-delete" onclick="deleteQuestion('${item._id}')">Supprimer</button>
                    `;
                    container.appendChild(box);
                });
            } catch (e) {
                container.innerHTML = "<p style='text-align:center; color:red;'>Erreur de chargement.</p>";
            }
        }

        // 4. TU SUPPRIMES LES QUESTIONS LUES
        async function deleteQuestion(id) {
            if (confirm("Supprimer définitivement ?")) {
                try {
                    await fetch(`https://crudcrud.com/api/88fa632ba5f84d63b2fba96b5cb99477/messages/${id}`, { method: "DELETE" });
                    renderQuestions();
                } catch (e) {
                    alert("Erreur de suppression");
                }
            }
        }
    </script>
</body>
</html>
