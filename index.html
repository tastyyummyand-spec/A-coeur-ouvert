<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>À Cœur Ouvert - Code Girlz</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600&family=Playfair+Display:ital,wght=1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="floating-particle" style="top:25%; left:12%; animation-delay: 2s;">🦋</div>
    <div class="floating-particle" style="top:60%; left:75%; animation-delay: 5s;">✝️</div>

    <header class="luxury-header" style="padding: 50px 20px 15px;">
        <h1>À Cœur Ouvert</h1>
        <div class="verset" style="font-family:'Montserrat'; text-transform:none;">Exprimez-vous en toute liberté.</div>
    </header>

    <div class="grid-layout" style="margin-top: 0;">
        <div class="card-premium col-12">
            <h2>Boîte à Questions Secrètes</h2>
            <p style="margin-bottom: 20px; font-size: 0.95rem; opacity: 0.75;">Votre anonymat est totalement préservé. Votre message est envoyé directement sur la tablette de l'animatrice.</p>
            <textarea id="private-message" class="input-premium" rows="5" placeholder="Posez votre question sur la foi, l'identité, les relations ou les finances..."></textarea>
            
            <button class="btn-premium" style="width: 100%; margin-top: 20px; justify-content: center;" onclick="sendSecret()">
                Déposer dans le Cocon Sacré
            </button>
            
            <p id="alert-success" style="display: none; text-align: center; margin-top: 15px; color: var(--purple-royal, #6a1b9a); font-weight: 600; font-size: 0.9rem;"></p>
        </div>
    </div>

    <script>
        // 🛠️ COLLER TON LIEN DE WEBHOOK DISCORD ENTRE LES GUILLEMETS CI-DESSOUS :
        const DISCORD_WEBHOOK_URL = "METS_TON_LIEN_DISCORD_ICI";

        async function sendSecret() {
            const field = document.getElementById('private-message');
            const text = field.value.trim();
            const alertBox = document.getElementById('alert-success');
            
            if (text !== "") {
                alertBox.innerText = "⏳ Envoi au cocon...";
                alertBox.style.display = "block";

                // Si tu n'as pas encore créé le webhook, le code te prévient gentiment
                if (DISCORD_WEBHOOK_URL === "METS_TON_LIEN_DISCORD_ICI") {
                    alertBox.innerText = "⚙️ Mode Test : Configuration du salon Discord requise.";
                    setTimeout(() => { alertBox.style.display = "none"; }, 4000);
                    return;
                }

                try {
                    // Envoi direct et anonyme vers ton salon Discord
                    const response = await fetch(DISCORD_WEBHOOK_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            username: "Anonyme 🦋",
                            content: `📩 **Nouvelle question :**\n${text}`
                        })
                    });

                    if (response.ok) {
                        field.value = "";
                        alertBox.innerText = "✨ Votre question a été déposée avec douceur. Merci, ma sœur.";
                    } else {
                        alertBox.innerText = "❌ Une petite erreur est survenue, réessayez.";
                    }
                } catch (error) {
                    alertBox.innerText = "❌ Souci de réseau, réessayez.";
                }
                
                setTimeout(() => { alertBox.style.display = "none"; }, 4000);
            }
        }
    </script>
</body>
</html>
