<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messages — À Cœur Ouvert</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .question-row {
            background: rgba(255,255,255,0.85);
            padding: 18px 20px;
            border-radius: 16px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 14px;
            border-left: 4px solid var(--purple-light);
            box-shadow: 0 2px 12px rgba(109,40,217,0.06);
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .question-text {
            font-size: 0.95rem;
            color: var(--purple-deep);
            line-height: 1.65;
            flex: 1;
            font-style: italic;
        }
        .btn-delete {
            background: rgba(153,27,27,0.08);
            color: #991b1b;
            border: 1px solid rgba(153,27,27,0.2);
            padding: 9px 14px;
            border-radius: 10px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            flex-shrink: 0;
        }
        .btn-delete:hover { background: rgba(153,27,27,0.16); }
        .empty-state {
            text-align: center;
            padding: 50px 20px;
            color: var(--purple-mid);
            font-style: italic;
            opacity: 0.5;
            font-size: 0.95rem;
        }
        .count-badge {
            display: inline-block;
            background: rgba(167,139,250,0.15);
            color: var(--purple-mid);
            border-radius: 50px;
            padding: 3px 12px;
            font-size: 0.78rem;
            font-weight: 600;
            margin-left: 10px;
            vertical-align: middle;
        }
    </style>
</head>
<body>


    <header class="luxury-header">
        <div class="brand-badge">Espace Présidente</div>
        <h1>À Cœur Ouvert</h1>
        <div class="verset">Questions des participantes</div>
    </header>

    <div class="grid-layout" style="max-width: 700px;">
        <div class="card-premium col-12">
            <h2>
                <i class="fa-regular fa-envelope-open" style="font-size:1.1rem; color:var(--purple-light);"></i>
                Messages reçus
                <span class="count-badge" id="count">0</span>
            </h2>
            <div id="questions-box">
                <div class="empty-state">🕊️ Aucun message pour le moment…</div>
            </div>
        </div>
    </div>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getDatabase, ref, onValue, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBR_Aq3uBI1mmARbSSXXWnmxBI4wq19lxs",
            authDomain: "a-coeur-ouver.firebaseapp.com",
            databaseURL: "https://a-coeur-ouver-default-rtdb.firebaseio.com",
            projectId: "a-coeur-ouver",
            storageBucket: "a-coeur-ouver.firebasestorage.app",
            messagingSenderId: "385888150365",
            appId: "1:385888150365:web:4dd22f9d5ca0e53b7bfeb4"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        onValue(ref(db, 'questions'), (snapshot) => {
            const box = document.getElementById('questions-box');
            const data = snapshot.val();

            if (!data) {
                box.innerHTML = '<div class="empty-state">🕊️ Aucun message pour le moment…</div>';
                document.getElementById('count').textContent = '0';
                return;
            }

            const questions = Object.entries(data).map(([id, val]) => ({ id, ...val }));
            questions.sort((a, b) => a.timestamp - b.timestamp);
            document.getElementById('count').textContent = questions.length;

            box.innerHTML = '';
            const wrapper = document.createElement('div');
            wrapper.style.cssText = 'display:flex; flex-direction:column; gap:10px;';

            questions.forEach((q) => {
                const row = document.createElement('div');
                row.className = 'question-row';
                row.innerHTML = `
                    <span class="question-text">"${q.texte}"</span>
                    <button class="btn-delete" onclick="window.deleteQ('${q.id}')">
                        Supprimer
                    </button>
                `;
                wrapper.appendChild(row);
            });

            box.appendChild(wrapper);
        });

        window.deleteQ = function(id) {
            remove(ref(db, 'questions/' + id));
        };
    </script>
</body>
</html>
